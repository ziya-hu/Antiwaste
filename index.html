<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntiWaste 🌿</title>
  <meta name="theme-color" content="#00A550">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AntiWaste">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f0fdf4; }
    ::-webkit-scrollbar { display: none; }
    .card:hover { transform: translateY(-1px); }
    textarea:focus { outline: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .fadeIn { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function getSaved(key, fallback) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }

    const TODAY = new Date();

    const initialFoods = [
      { id: 1, name: "Toyuq salatı", added: "2026-05-04", expiry: "2026-05-07", category: "Salat", recipe: "Toyuq döşünü bişirin, doğrayın, tərəvəzlə qarışdırın." },
      { id: 2, name: "Düyü", added: "2026-05-05", expiry: "2026-05-10", category: "Dən", recipe: "Düyünü yuyun, 2 hissə su ilə bişirin." },
      { id: 3, name: "Lobya yeməyi", added: "2026-05-04", expiry: "2026-05-08", category: "Ərzaq", recipe: "Lobyaları isladın, soğan və pomidorla bişirin." },
      { id: 4, name: "Makaron", added: "2026-05-06", expiry: "2026-05-13", category: "Pasta", recipe: "Qaynayan duzlu suda 8-10 dəq bişirin." },
      { id: 5, name: "Süd", added: "2026-05-05", expiry: "2026-05-07", category: "Südlü", recipe: "Soyuducuda saxlayın, 3 gündən çox saxlamayın." },
    ];

    const initialHistory = [
      { name: "Kərə yağı", onTime: true },
      { name: "Yoğurt", onTime: true },
      { name: "Pomidor", onTime: false },
      { name: "Pendir", onTime: true },
      { name: "Yumurta", onTime: true },
      { name: "Alma", onTime: true },
      { name: "Çörək", onTime: false },
      { name: "Ayran", onTime: true },
    ];

    const CAT_EMOJI = { Salat: "🥗", Dən: "🌾", Ərzaq: "🥘", Pasta: "🍝", Südlü: "🥛", Meyvə: "🍎" };

    function daysLeft(expiry) {
      return Math.ceil((new Date(expiry) - TODAY) / 86400000);
    }

    function Badge({ days }) {
      const cfg = days <= 1 ? { bg: "#ef4444", label: "Kritik" }
        : days <= 3 ? { bg: "#f59e0b", label: "Tezliklə" }
        : { bg: "#22c55e", label: "Normal" };
      return (
        <span style={{ background: cfg.bg, color: "#fff", fontSize: 10, fontWeight: 800, borderRadius: 6, padding: "2px 7px" }}>
          {cfg.label}
        </span>
      );
    }

    async function fetchAIRecipe(foodName, category) {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Sən bir aşpaz köməkçisisən. "${foodName}" (kateqoriya: ${category}) məhsulu üçün qısa və sadə bir resept yaz. Azərbaycan dilində cavab ver.`
          }]
        })
      });
      const data = await response.json();
      return data.content?.[0]?.text || "Resept tapılmadı.";
    }

    function App() {
      const [tab, setTab] = useState(0);
      const [foods, setFoods] = useState(() => getSaved("aw_foods", initialFoods));
      const [history, setHistory] = useState(() => getSaved("aw_history", initialHistory));
      const [showAdd, setShowAdd] = useState(false);
      const [detail, setDetail] = useState(null);
      const [editingRecipe, setEditingRecipe] = useState(false);
      const [editRecipeText, setEditRecipeText] = useState("");
      const [newFood, setNewFood] = useState({ name: "", expiry: "", category: "Salat", recipe: "" });
      const [toast, setToast] = useState("");
      const [scanning, setScanning] = useState(false);
      const [dark, setDark] = useState(() => getSaved("aw_dark", false));
      const [aiLoading, setAiLoading] = useState(false);
      const [aiLoadingDetail, setAiLoadingDetail] = useState(false);
      const [statFilter, setStatFilter] = useState(null);
      const [profilePhoto, setProfilePhoto] = useState(() => getSaved("aw_photo", null));
      const [profileName, setProfileName] = useState(() => getSaved("aw_name", "İstifadəçi"));
      const [editingName, setEditingName] = useState(false);
      const [tempName, setTempName] = useState("");
      const [showPhotoOptions, setShowPhotoOptions] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => { save("aw_foods", foods); }, [foods]);
      useEffect(() => { save("aw_history", history); }, [history]);
      useEffect(() => { save("aw_dark", dark); }, [dark]);
      useEffect(() => { save("aw_photo", profilePhoto); }, [profilePhoto]);
      useEffect(() => { save("aw_name", profileName); }, [profileName]);

      const expiring = foods.filter(f => daysLeft(f.expiry) <= 3);
      const safe = foods.filter(f => daysLeft(f.expiry) > 3);
      const critical = foods.filter(f => daysLeft(f.expiry) <= 1);
      const totalDeleted = history.length;
      const onTimeCount = history.filter(h => h.onTime).length;

      const t = {
        bg: dark ? "#0f172a" : "#f0fdf4",
        card: dark ? "#1e293b" : "#ffffff",
        border: dark ? "#334155" : "#e5e7eb",
        borderRed: dark ? "#7f1d1d" : "#fca5a5",
        text: dark ? "#f1f5f9" : "#1e293b",
        sub: dark ? "#94a3b8" : "#999999",
        sub2: dark ? "#64748b" : "#aaaaaa",
        inputBg: dark ? "#1e293b" : "#ffffff",
        inputBorder: dark ? "#475569" : "#e5e7eb",
        recipeBlock: dark ? "#0f2a1f" : "#f0fdf4",
        shadow: dark ? "rgba(0,0,0,0.4)" : "rgba(0,0,0,0.06)",
      };

      function notify(msg) {
        setToast(msg);
        setTimeout(() => setToast(""), 2500);
      }

      function handlePhotoSelect(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) { notify("❌ Yalnız şəkil faylı seçin!"); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
          setProfilePhoto(ev.target.result);
          notify("✅ Profil şəkli yeniləndi!");
        };
        reader.readAsDataURL(file);
        setShowPhotoOptions(false);
      }

      function handleRemovePhoto() {
        setProfilePhoto(null);
        setShowPhotoOptions(false);
        notify("🗑️ Profil şəkli silindi.");
      }

      function handleSaveName() {
        if (tempName.trim()) {
          setProfileName(tempName.trim());
          notify("✅ Ad saxlanıldı!");
        }
        setEditingName(false);
      }

      async function handleAIRecipeForNew() {
        if (!newFood.name) { notify("⚠️ Əvvəlcə məhsul adını yazın!"); return; }
        setAiLoading(true);
        try {
          const recipe = await fetchAIRecipe(newFood.name, newFood.category);
          setNewFood(p => ({ ...p, recipe }));
          notify("🤖 AI resept hazırladı!");
        } catch { notify("❌ Xəta baş verdi."); }
        setAiLoading(false);
      }

      async function handleAIRecipeForDetail() {
        if (!detail) return;
        setAiLoadingDetail(true);
        try {
          const recipe = await fetchAIRecipe(detail.name, detail.category);
          setFoods(p => p.map(f => f.id === detail.id ? { ...f, recipe } : f));
          setDetail(d => ({ ...d, recipe }));
          notify("🤖 AI resept yeniləndi!");
        } catch { notify("❌ Xəta baş verdi."); }
        setAiLoadingDetail(false);
      }

      function saveEditedRecipe() {
        setFoods(p => p.map(f => f.id === detail.id ? { ...f, recipe: editRecipeText } : f));
        setDetail(d => ({ ...d, recipe: editRecipeText }));
        setEditingRecipe(false);
        notify("✅ Resept saxlanıldı!");
      }

      function addFood() {
        if (!newFood.name || !newFood.expiry) return;
        setFoods(p => [...p, {
          id: Date.now(), name: newFood.name,
          added: new Date().toISOString().split("T")[0], expiry: newFood.expiry,
          category: newFood.category,
          recipe: newFood.recipe || "Resept hələ əlavə edilməyib."
        }]);
        setNewFood({ name: "", expiry: "", category: "Salat", recipe: "" });
        setShowAdd(false);
        notify("✅ Məhsul əlavə edildi!");
      }

      function deleteFood(id) {
        const food = foods.find(f => f.id === id);
        if (food) {
          const onTime = daysLeft(food.expiry) >= 0;
          setHistory(p => [...p, { name: food.name, onTime }]);
        }
        setFoods(p => p.filter(f => f.id !== id));
        setDetail(null);
        setEditingRecipe(false);
        notify(food && daysLeft(food.expiry) >= 0 ? "✅ Vaxtında istifadə edildi!" : "🗑️ Məhsul bitdi.");
      }

      function scan() {
        setScanning(true);
        setTimeout(() => { setScanning(false); setShowAdd(true); notify("📷 QR uğurla oxundu!"); }, 1500);
      }

      const tabs = [
        { icon: "🏠", label: "Əsas" },
        { icon: "📦", label: "Ərzaqlar" },
        { icon: "🍳", label: "Reseptlər" },
        { icon: "👤", label: "Profil" },
      ];

      const cardStyle = (urgent) => ({
        background: t.card, borderRadius: 14, margin: "0 0 8px",
        padding: "12px 14px", display: "flex", alignItems: "center", gap: 12,
        boxShadow: urgent ? "0 2px 12px rgba(239,68,68,0.2)" : `0 2px 8px ${t.shadow}`,
        border: urgent ? `1.5px solid ${t.borderRed}` : `1.5px solid ${t.border}`,
        cursor: "pointer", transition: "transform 0.15s",
      });

      const cardStyleMargin = (urgent) => ({ ...cardStyle(urgent), margin: "0 16px 8px" });
      const sectionTitle = { padding: "12px 16px 6px", fontSize: 14, fontWeight: 800, color: t.text };
      const inputStyle = {
        width: "100%", border: `1.5px solid ${t.inputBorder}`, borderRadius: 10,
        padding: "11px 13px", fontSize: 14, marginBottom: 10, outline: "none",
        background: t.inputBg, color: t.text,
      };
      const modalBox = {
        background: t.card, width: "100%", maxWidth: 480,
        margin: "0 auto", borderRadius: "20px 20px 0 0", padding: "24px 20px 36px",
        maxHeight: "90vh", overflowY: "auto",
      };
      const aiBtnStyle = (loading) => ({
        width: "100%", background: loading ? "#94a3b8" : "linear-gradient(135deg,#6366f1,#8b5cf6)",
        color: "#fff", border: "none", borderRadius: 10, padding: "10px",
        fontSize: 13, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer",
        marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "center", gap: 6
      });

      const statFilterFoods = statFilter === "umumi" ? foods : statFilter === "tezlikle" ? expiring : statFilter === "kritik" ? critical : [];
      const statFilterTitle = statFilter === "umumi" ? "📦 Bütün Məhsullar" : statFilter === "tezlikle" ? "⚠️ Tezliklə Bitəcək" : "🔴 Kritik Məhsullar";

      return (
        <div style={{ minHeight: "100vh", background: t.bg, fontFamily: "'Nunito', sans-serif", maxWidth: 480, margin: "0 auto", position: "relative" }}>

          <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handlePhotoSelect} />

          {/* TOAST */}
          {toast && (
            <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: "#1e293b", color: "#fff", borderRadius: 12, padding: "10px 20px", fontSize: 13, fontWeight: 700, zIndex: 9999, whiteSpace: "nowrap" }}>
              {toast}
            </div>
          )}

          {/* HEADER */}
          <div style={{ background: "#00A550", color: "#fff", padding: "20px 20px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: 900, letterSpacing: -0.5 }}>🌿 AntiWaste</div>
              <div style={{ fontSize: 12, opacity: 0.85, marginTop: 2 }}>
                {(() => { const d = new Date(); const months = ["Yanvar","Fevral","Mart","Aprel","May","İyun","İyul","Avqust","Sentyabr","Oktyabr","Noyabr","Dekabr"]; return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`; })()}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div onClick={() => setTab(3)} style={{ width: 36, height: 36, borderRadius: "50%", overflow: "hidden", border: "2px solid rgba(255,255,255,0.6)", cursor: "pointer", background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                {profilePhoto ? <img src={profilePhoto} alt="profil" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 18 }}>👤</span>}
              </div>
              <button onClick={() => setDark(d => !d)} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 10, padding: "6px 10px", cursor: "pointer", fontSize: 16, color: "#fff" }}>
                {dark ? "☀️" : "🌙"}
              </button>
            </div>
          </div>

          <div style={{ overflowY: "auto", paddingBottom: 74 }}>

            {/* ANA SƏHİFƏ */}
            {tab === 0 && (
              <div>
                <div style={{ display: "flex", gap: 10, padding: "16px 16px 8px" }}>
                  {[
                    { label: "Ümumi", val: foods.length, bg: "#0066B3", key: "umumi" },
                    { label: "Tezliklə", val: expiring.length, bg: "#EF3340", key: "tezlikle" },
                    { label: "Kritik", val: critical.length, bg: "#00A550", key: "kritik" },
                  ].map(s => (
                    <div key={s.label} onClick={() => setStatFilter(s.key)}
                      style={{ flex: 1, background: s.bg, borderRadius: 14, padding: "14px 10px", textAlign: "center", cursor: "pointer", transition: "transform 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.transform = "scale(1.04)"}
                      onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
                    >
                      <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>{s.val}</div>
                      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.9)", marginTop: 2 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div onClick={scan} style={{ margin: "8px 16px", background: "linear-gradient(135deg,#16a34a,#4ade80)", borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
                  <div style={{ fontSize: 36 }}>{scanning ? "⏳" : "📷"}</div>
                  <div style={{ color: "#fff" }}>
                    <div style={{ fontWeight: 900, fontSize: 15 }}>QR Kodu Skan Et</div>
                    <div style={{ fontSize: 12, opacity: 0.9, marginTop: 2 }}>Qabın üzərindəki kodu oxudun</div>
                  </div>
                </div>
                {expiring.length > 0 && (
                  <>
                    <div style={sectionTitle}>⚠️ Tezliklə Bitəcək</div>
                    {expiring.map(f => (
                      <div key={f.id} className="card" style={cardStyleMargin(true)} onClick={() => { setDetail(f); setEditingRecipe(false); }}>
                        <div style={{ fontSize: 30 }}>{CAT_EMOJI[f.category] || "🥫"}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 800, fontSize: 15, color: t.text }}>{f.name}</div>
                          <div style={{ marginTop: 4 }}><Badge days={daysLeft(f.expiry)} /></div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontSize: 22, fontWeight: 900, color: daysLeft(f.expiry) <= 1 ? "#ef4444" : "#f59e0b" }}>{daysLeft(f.expiry)}</div>
                          <div style={{ fontSize: 10, color: t.sub }}>gün</div>
                        </div>
                      </div>
                    ))}
                  </>
                )}
                <div style={sectionTitle}>✅ Normal Vəziyyətdə</div>
                {safe.length === 0 && <div style={{ padding: "8px 16px", color: t.sub, fontSize: 13 }}>Heç bir məhsul yoxdur.</div>}
                {safe.map(f => (
                  <div key={f.id} className="card" style={cardStyleMargin(false)} onClick={() => { setDetail(f); setEditingRecipe(false); }}>
                    <div style={{ fontSize: 30 }}>{CAT_EMOJI[f.category] || "🥫"}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 800, fontSize: 15, color: t.text }}>{f.name}</div>
                      <div style={{ fontSize: 12, color: t.sub, marginTop: 2 }}>{f.category}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 20, fontWeight: 900, color: "#22c55e" }}>{daysLeft(f.expiry)}</div>
                      <div style={{ fontSize: 10, color: t.sub }}>gün</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ƏRZAQLAR */}
            {tab === 1 && (
              <div>
                <div style={sectionTitle}>Bütün Ərzaqlar ({foods.length})</div>
                {[...foods].sort((a, b) => daysLeft(a.expiry) - daysLeft(b.expiry)).map(f => (
                  <div key={f.id} className="card" style={cardStyleMargin(daysLeft(f.expiry) <= 3)} onClick={() => { setDetail(f); setEditingRecipe(false); }}>
                    <div style={{ fontSize: 30 }}>{CAT_EMOJI[f.category] || "🥫"}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 800, fontSize: 14, color: t.text }}>{f.name}</div>
                      <div style={{ fontSize: 12, color: t.sub2, marginTop: 2 }}>Bitmə: {f.expiry}</div>
                    </div>
                    <Badge days={daysLeft(f.expiry)} />
                  </div>
                ))}
              </div>
            )}

            {/* RESEPTLƏR */}
            {tab === 2 && (
              <div style={{ padding: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: t.text, marginBottom: 12 }}>🍳 Reseptlər</div>
                {expiring.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "40px 0", color: t.sub }}>
                    <div style={{ fontSize: 52 }}>🎉</div>
                    <div style={{ fontWeight: 700, marginTop: 12 }}>Heç bir ərzaq tezliklə bitmir!</div>
                  </div>
                ) : expiring.map(f => (
                  <div key={f.id} style={{ background: t.card, borderRadius: 16, padding: 16, marginBottom: 12, border: `1.5px solid ${t.border}` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                      <div style={{ fontSize: 32 }}>{CAT_EMOJI[f.category] || "🥫"}</div>
                      <div>
                        <div style={{ fontWeight: 900, fontSize: 15, color: t.text }}>{f.name}</div>
                        <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700 }}>{daysLeft(f.expiry)} gün qalıb</div>
                      </div>
                      <button onClick={() => { setDetail(f); setEditingRecipe(false); }} style={{ marginLeft: "auto", background: "#f0fdf4", border: "none", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", color: "#16a34a", fontWeight: 700 }}>Detay</button>
                    </div>
                    <div style={{ background: t.recipeBlock, borderRadius: 10, padding: "10px 12px", fontSize: 13, color: t.text, lineHeight: 1.6 }}>
                      {f.recipe}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* PROFİL */}
            {tab === 3 && (
              <div style={{ padding: 16 }}>
                <div style={{ background: "linear-gradient(135deg,#16a34a,#4ade80)", borderRadius: 20, padding: "28px 20px 24px", textAlign: "center", marginBottom: 16 }}>
                  <div style={{ position: "relative", display: "inline-block", marginBottom: 12 }}>
                    <div onClick={() => setShowPhotoOptions(true)} style={{ width: 90, height: 90, borderRadius: "50%", overflow: "hidden", border: "3px solid rgba(255,255,255,0.8)", cursor: "pointer", background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto" }}>
                      {profilePhoto ? <img src={profilePhoto} alt="profil" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 44 }}>👤</span>}
                    </div>
                    <div onClick={() => setShowPhotoOptions(true)} style={{ position: "absolute", bottom: 2, right: 2, background: "#fff", borderRadius: "50%", width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.2)", fontSize: 13 }}>
                      📷
                    </div>
                  </div>
                  {editingName ? (
                    <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center", marginBottom: 6 }}>
                      <input value={tempName} onChange={e => setTempName(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSaveName()} autoFocus
                        style={{ background: "rgba(255,255,255,0.3)", border: "1.5px solid rgba(255,255,255,0.6)", borderRadius: 8, padding: "5px 10px", fontSize: 16, fontWeight: 800, color: "#fff", outline: "none", textAlign: "center", width: 160 }}
                        placeholder="Adınızı yazın" />
                      <button onClick={handleSaveName} style={{ background: "rgba(255,255,255,0.3)", border: "none", borderRadius: 8, padding: "5px 10px", cursor: "pointer", color: "#fff", fontWeight: 800, fontSize: 13 }}>✓</button>
                    </div>
                  ) : (
                    <div onClick={() => { setTempName(profileName); setEditingName(true); }} style={{ fontWeight: 900, fontSize: 20, color: "#fff", marginBottom: 4, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6 }}>
                      {profileName} <span style={{ fontSize: 14, opacity: 0.7 }}>✏️</span>
                    </div>
                  )}
                  <div style={{ opacity: 0.85, fontSize: 13, color: "#fff" }}>AntiWaste Üzvü · 2026</div>
                </div>
                {[
                  { icon: "💰", label: "Qənaət", val: `₼ ${(onTimeCount * 3).toFixed(2)}` },
                  { icon: "🍂", label: "İsraf miqdarı", val: `${totalDeleted - onTimeCount} məhsul` },
                  { icon: "📦", label: "İzlənən ərzaq", val: `${foods.length} məhsul` },
                  { icon: "🏆", label: "Xal", val: `${onTimeCount * 20 + foods.length * 10}` },
                ].map(item => (
                  <div key={item.label} style={{ background: t.card, borderRadius: 14, padding: "14px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 14, border: `1.5px solid ${t.border}` }}>
                    <div style={{ fontSize: 24 }}>{item.icon}</div>
                    <div style={{ flex: 1, fontWeight: 600, color: t.text, fontSize: 14 }}>{item.label}</div>
                    <div style={{ fontWeight: 900, color: "#16a34a", fontSize: 15 }}>{item.val}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* TAB BAR */}
          <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: dark ? "#1e293b" : "#ffffff", borderTop: `1.5px solid ${dark ? "#334155" : "#e5e7eb"}`, display: "flex", alignItems: "center", zIndex: 100 }}>
            {tabs.slice(0, 2).map((tb, i) => (
              <div key={i} onClick={() => setTab(i)} style={{ flex: 1, padding: "10px 0 8px", textAlign: "center", cursor: "pointer", fontSize: 11, fontWeight: tab === i ? 800 : 500, color: tab === i ? "#16a34a" : t.sub }}>
                <div style={{ fontSize: 20 }}>{tb.icon}</div>
                <div>{tb.label}</div>
              </div>
            ))}
            <div style={{ flex: 1, display: "flex", justifyContent: "center", alignItems: "center", paddingBottom: 8 }}>
              <button onClick={() => setShowAdd(true)} style={{ background: "#16a34a", color: "#fff", border: "none", borderRadius: "50%", width: 50, height: 50, fontSize: 26, cursor: "pointer", boxShadow: "0 4px 16px rgba(22,163,74,0.4)", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
            </div>
            {tabs.slice(2).map((tb, i) => (
              <div key={i + 2} onClick={() => setTab(i + 2)} style={{ flex: 1, padding: "10px 0 8px", textAlign: "center", cursor: "pointer", fontSize: 11, fontWeight: tab === i + 2 ? 800 : 500, color: tab === i + 2 ? "#16a34a" : t.sub }}>
                <div style={{ fontSize: 20 }}>{tb.icon}</div>
                <div>{tb.label}</div>
              </div>
            ))}
          </div>

          {/* FOTO SEÇİM MODAL */}
          {showPhotoOptions && (
            <div onClick={() => setShowPhotoOptions(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
              <div onClick={e => e.stopPropagation()} className="fadeIn" style={{ background: t.card, width: "100%", maxWidth: 480, margin: "0 auto", borderRadius: "20px 20px 0 0", padding: "24px 20px 36px" }}>
                <div style={{ fontWeight: 900, fontSize: 17, color: t.text, marginBottom: 6, textAlign: "center" }}>Profil Şəkli</div>
                <div style={{ fontSize: 12, color: t.sub, textAlign: "center", marginBottom: 20 }}>Şəklinizi yeniləyin</div>
                <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ width: "100%", background: "#16a34a", color: "#fff", border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 10 }}>
                  🖼️ Qalereyadan Seç
                </button>
                {profilePhoto && (
                  <button onClick={handleRemovePhoto} style={{ width: "100%", background: "#ef4444", color: "#fff", border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 10 }}>
                    🗑️ Şəkli Sil
                  </button>
                )}
                <button onClick={() => setShowPhotoOptions(false)} style={{ width: "100%", background: dark ? "#334155" : "#f1f5f9", color: t.text, border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>
                  Ləğv et
                </button>
              </div>
            </div>
          )}

          {/* STAT FİLTER MODAL */}
          {statFilter && (
            <div onClick={() => setStatFilter(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
              <div onClick={e => e.stopPropagation()} style={{ background: t.card, width: "100%", maxWidth: 480, margin: "0 auto", borderRadius: "20px 20px 0 0", padding: "20px 16px 36px", maxHeight: "70vh", overflowY: "auto" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                  <div style={{ fontWeight: 900, fontSize: 17, color: t.text }}>{statFilterTitle}</div>
                  <button onClick={() => setStatFilter(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer" }}>✕</button>
                </div>
                {statFilterFoods.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "30px 0", color: t.sub }}>
                    <div style={{ fontSize: 40 }}>🎉</div>
                    <div style={{ fontWeight: 700, marginTop: 8 }}>Bu kateqoriyada məhsul yoxdur</div>
                  </div>
                ) : statFilterFoods.map(f => (
                  <div key={f.id} className="card" style={cardStyle(daysLeft(f.expiry) <= 3)} onClick={() => { setStatFilter(null); setDetail(f); setEditingRecipe(false); }}>
                    <div style={{ fontSize: 30 }}>{CAT_EMOJI[f.category] || "🥫"}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 800, fontSize: 15, color: t.text }}>{f.name}</div>
                      <div style={{ marginTop: 4 }}><Badge days={daysLeft(f.expiry)} /></div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 20, fontWeight: 900, color: daysLeft(f.expiry) <= 1 ? "#ef4444" : "#22c55e" }}>{daysLeft(f.expiry)}</div>
                      <div style={{ fontSize: 10, color: t.sub }}>gün</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ADD MODAL */}
          {showAdd && (
            <div onClick={() => setShowAdd(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
              <div onClick={e => e.stopPropagation()} style={modalBox}>
                <div style={{ fontWeight: 900, fontSize: 18, color: t.text, marginBottom: 16 }}>➕ Yeni Məhsul</div>
                <input value={newFood.name} onChange={e => setNewFood(p => ({ ...p, name: e.target.value }))} placeholder="Məhsul adı" style={inputStyle} />
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 12, color: t.sub, marginBottom: 4, fontWeight: 700 }}>📅 Bitmə tarixi</div>
                  <input type="date" value={newFood.expiry} onChange={e => setNewFood(p => ({ ...p, expiry: e.target.value }))} style={{ width: "100%", border: `1.5px solid ${t.inputBorder}`, borderRadius: 10, padding: "11px 13px", fontSize: 16, outline: "none", background: t.inputBg, color: t.text, colorScheme: dark ? "dark" : "light", appearance: "none", WebkitAppearance: "none" }} />
                </div>
                <select value={newFood.category} onChange={e => setNewFood(p => ({ ...p, category: e.target.value }))} style={inputStyle}>
                  {Object.keys(CAT_EMOJI).map(c => <option key={c}>{c}</option>)}
                </select>
                <button onClick={handleAIRecipeForNew} disabled={aiLoading} style={aiBtnStyle(aiLoading)}>
                  {aiLoading ? <span className="spin">⏳</span> : "🤖"} {aiLoading ? "AI resept hazırlayır..." : "AI ilə Resept Yaz"}
                </button>
                <textarea value={newFood.recipe} onChange={e => setNewFood(p => ({ ...p, recipe: e.target.value }))} placeholder="Resept (ixtiyari)" style={{ ...inputStyle, minHeight: 80, resize: "none" }} />
                <button onClick={addFood} style={{ width: "100%", background: "#16a34a", color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 8 }}>✅ Əlavə Et</button>
                <button onClick={() => setShowAdd(false)} style={{ width: "100%", background: dark ? "#334155" : "#f1f5f9", color: t.text, border: "none", borderRadius: 10, padding: "13px", fontSize: 15, cursor: "pointer" }}>Ləğv et</button>
              </div>
            </div>
          )}

          {/* DETAIL MODAL */}
          {detail && (
            <div onClick={() => { setDetail(null); setEditingRecipe(false); }} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "flex-end" }}>
              <div onClick={e => e.stopPropagation()} style={modalBox}>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 54 }}>{CAT_EMOJI[detail.category] || "🥫"}</div>
                  <div style={{ fontWeight: 900, fontSize: 20, color: t.text, marginTop: 8 }}>{detail.name}</div>
                  <div style={{ marginTop: 6 }}><Badge days={daysLeft(detail.expiry)} /></div>
                </div>
                {[
                  ["📅 Əlavə tarixi", detail.added],
                  ["⏰ Bitmə tarixi", detail.expiry],
                  ["📂 Kateqoriya", detail.category],
                  ["⏳ Qalan gün", `${daysLeft(detail.expiry)} gün`]
                ].map(([k, v]) => (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${t.border}` }}>
                    <span style={{ fontSize: 13, color: t.sub }}>{k}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{v}</span>
                  </div>
                ))}
                <div style={{ marginTop: 14 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontWeight: 800, color: "#16a34a", fontSize: 13 }}>🍳 Resept</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={handleAIRecipeForDetail} disabled={aiLoadingDetail} style={{ background: "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", border: "none", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>
                        {aiLoadingDetail ? "⏳" : "🤖 AI"}
                      </button>
                      <button onClick={() => { setEditingRecipe(true); setEditRecipeText(detail.recipe); }} style={{ background: "#f0fdf4", color: "#16a34a", border: "none", borderRadius: 8, padding: "5px 10px", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>
                        ✏️ Redaktə
                      </button>
                    </div>
                  </div>
                  {editingRecipe ? (
                    <div>
                      <textarea value={editRecipeText} onChange={e => setEditRecipeText(e.target.value)} style={{ ...inputStyle, minHeight: 100, resize: "none" }} />
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={saveEditedRecipe} style={{ flex: 1, background: "#16a34a", color: "#fff", border: "none", borderRadius: 8, padding: "9px", cursor: "pointer", fontWeight: 700 }}>✅ Saxla</button>
                        <button onClick={() => setEditingRecipe(false)} style={{ flex: 1, background: dark ? "#334155" : "#f1f5f9", color: t.text, border: "none", borderRadius: 8, padding: "9px", cursor: "pointer" }}>Ləğv</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{ background: t.recipeBlock, borderRadius: 12, padding: 12, fontSize: 13, color: t.text, lineHeight: 1.6 }}>
                      {detail.recipe}
                    </div>
                  )}
                </div>
                <button onClick={() => deleteFood(detail.id)} style={{ width: "100%", background: "#ef4444", color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 14, marginBottom: 8 }}>🗑️ Sil</button>
                <button onClick={() => { setDetail(null); setEditingRecipe(false); }} style={{ width: "100%", background: dark ? "#334155" : "#f1f5f9", color: t.text, border: "none", borderRadius: 10, padding: "13px", fontSize: 15, cursor: "pointer" }}>Bağla</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
